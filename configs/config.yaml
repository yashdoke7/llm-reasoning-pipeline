# ──────────────────────────────────────────────────────────────
# LLM Reasoning Evaluation + LoRA Fine-Tuning Pipeline
# Main Configuration
# ──────────────────────────────────────────────────────────────

# ── Provider ───────────────────────────────────────────────────
# "groq" = cloud API (rate-limited), "ollama" = local (unlimited, free)
provider: "groq"

# ── Ollama Settings (only used when provider=ollama) ──────────
ollama:
  host: "http://localhost:11434"
  timeout: 120
  # When using Ollama, change the model IDs below to Ollama model names:
  #   eval_models:  llama3.2:3b, qwen2.5:7b, llama3.1:8b, phi3:medium
  #   evaluator:    qwen2.5:7b  (good at JSON output)

# ── OpenAI Settings (use as judge — not solver) ──────────────
openai:
  timeout: 60
  # Recommended judge models (cheapest to most capable):
  #   gpt-4o-mini          ~$0.003 for full 33-task eval  ← recommended
  #   gpt-4o               ~$0.04  for full 33-task eval
  # Usage:
  #   python experiments/run_baseline_eval.py \
  #     --provider ollama --models qwen2.5:3b \
  #     --judge-provider openai --judge-model gpt-4o-mini \
  #     --samples 10 --no-wandb

project:
  name: "llm-reasoning-eval"
  version: "1.0.0"
  description: "Step-level LLM reasoning evaluation and targeted LoRA fine-tuning"

# ── API Keys (set via env vars — never hardcode) ──────────────
api:
  groq_api_key_env: "GROQ_API_KEY"          # export GROQ_API_KEY=your_key
  # Optional key rotation pool for long evaluations.
  # If key_1 reaches TPD, client automatically switches to key_2, then key_3.
  groq_api_key_envs:
    - "GROQ_API_KEY"
    - "GROQ_API_KEY_2"
  openai_api_key_env: "OPENAI_API_KEY"       # export OPENAI_API_KEY=sk-...  (for judge)
  wandb_api_key_env: "WANDB_API_KEY"         # export WANDB_API_KEY=your_key
  wandb_project: "llm-reasoning-eval"
  wandb_entity: null                          # set to your W&B username if needed

# ── Models ────────────────────────────────────────────────────
models:
  eval_models:
    - id: "llama-3.1-8b-instant"
      display_name: "Llama-3.1-8B"
      provider: "groq"
    - id: "llama-3.3-70b-versatile"
      display_name: "Llama-3.3-70B"
      provider: "groq"
    - id: "meta-llama/llama-4-scout-17b-16e-instruct"
      display_name: "Llama-4-Scout"
      provider: "groq"

  evaluator_model: "llama-3.3-70b-versatile"   # judge model — 70B, free via Groq
  trace_gen_model: "llama-3.3-70b-versatile"
  # Local judge (recommended when running Ollama solver to avoid Groq TPD).
  local_judge_model: "qwen2.5:14b"

# ── Groq API Settings ─────────────────────────────────────────
groq:
  max_retries: 5
  base_delay: 1.0          # seconds
  max_delay: 60.0
  timeout: 30
  # tokens per minute limits (Groq free tier)
  tpm_limit: 14400
  rpm_limit: 30

# ── Evaluation Settings ───────────────────────────────────────
eval:
  # Number of samples per task category per model
  samples_per_category: 50   # start with 50, increase to 150 for full run
  max_reasoning_steps: 10
  min_reasoning_steps: 2
  temperature: 0.1           # low temp for reproducible reasoning
  max_tokens: 1024

  # Step evaluator thresholds
  uncertainty_threshold: 0.4  # below this = UNCERTAIN
  hallucination_threshold: 0.6

  # Task categories
  categories:
    - "multistep_arithmetic"
    - "factual_consistency"
    - "tool_use_planning"
    - "causal_counterfactual"

# ── Dataset Settings ──────────────────────────────────────────
datasets:
  gsm8k:
    split: "test"
    max_samples: 200          # use subset for speed; full test = 1319
    cache_dir: "data_loaders/data/gsm8k_cache"

  crass:
    # Option A — Generated (recommended): run data_loaders/generate_eval_datasets.py
    #   python data_loaders/generate_eval_datasets.py --categories causal_counterfactual --samples 60
    # Option B — Real CRASS: download from https://github.com/apergo-ai/CRASS
    #   Place file at data_loaders/data/crass_dataset.csv
    path: "data_loaders/data/generated_counterfactual.jsonl"
    max_samples: 60

  toolbench:
    # Option A — Generated (recommended): run data_loaders/generate_eval_datasets.py
    #   python data_loaders/generate_eval_datasets.py --categories tool_use_planning --samples 60
    # Option B — Hardcoded fallback (8 tasks only) — auto-used if file not found
    path: "data_loaders/data/generated_tooluse.jsonl"
    max_samples: 60

  factual_synthetic:
    # Option A — Generated (recommended): run data_loaders/generate_eval_datasets.py
    #   python data_loaders/generate_eval_datasets.py --categories factual_consistency --samples 60
    # Option B — Hardcoded fallback (8 tasks only) — auto-used if file not found
    path: "data_loaders/data/generated_factual.jsonl"
    max_samples: 60
    topics:
      - "climate_change"
      - "machine_learning"
      - "world_war_ii"
      - "quantum_computing"
      - "space_exploration"

# ── Dataset Generation Settings ───────────────────────────────
# Run: python data_loaders/generate_eval_datasets.py
# to create larger, diverse test sets for non-arithmetic categories.
# Recommended: --provider ollama --model qwen2.5:7b (free, local)
# Best quality: --provider openai --model gpt-4.1 (requires OPENAI_API_KEY)
dataset_generation:
  default_provider: "ollama"
  default_model: "qwen2.5:7b"
  samples_per_category: 60

# ── Mitigation Settings ───────────────────────────────────────
mitigation:
  retriever:
    type: "wikipedia"          # "wikipedia" | "local"
    top_k: 3
    max_chars_per_doc: 1500
  regrounder:
    max_regen_attempts: 2
    temperature: 0.05

# ── Fine-Tuning Settings ──────────────────────────────────────
finetune:
  base_model: "Qwen/Qwen2.5-3B-Instruct"  # 3B fits easily in 8GB VRAM, no license gate
  # Alternative if you want 8B: "meta-llama/Meta-Llama-3-8B-Instruct" (needs 4-bit loading)

  output_dir: "outputs/finetuned_model"
  dataset_path: "data_loaders/data/finetune_dataset.jsonl"

  lora:
    r: 16
    lora_alpha: 32
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
    lora_dropout: 0.05
    bias: "none"

  training:
    num_epochs: 3
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4    # effective batch = 16
    learning_rate: 2.0e-4
    warmup_ratio: 0.03
    lr_scheduler_type: "cosine"
    logging_steps: 10
    save_steps: 100
    eval_steps: 100
    max_seq_length: 1024
    load_in_4bit: true               # QLoRA — required for 8B on 8GB VRAM
    fp16: false
    bf16: true                       # use bf16 on modern GPUs (RTX 4070 supports it)

  quantization:
    output_dir: "outputs/quantized"
    formats:
      - name: "Q4_K_M"
        description: "4-bit, best quality/size tradeoff"
      - name: "Q8_0"
        description: "8-bit, near full quality"

# ── Paths ─────────────────────────────────────────────────────
paths:
  logs: "logs"
  outputs: "outputs"
  charts: "outputs/charts"
  reports: "outputs/reports"
  eval_results: "outputs/eval_results.json"
  failure_report: "outputs/failure_report.json"

# ── Logging ───────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
  file: "logs/pipeline.log"
